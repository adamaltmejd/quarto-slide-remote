name = "slide-remote"
main = "src/index.ts"
compatibility_date = "2025-01-15"
# Per-version preview URLs at <version-prefix>-<worker>.<subdomain>.workers.dev,
# so `wrangler versions upload` returns a testable URL without promoting to
# production. Production traffic stays on the latest deployed version.
preview_urls = true

[assets]
directory = "./assets"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Rate-limit /api/room/new per client IP. Cloudflare Workers Rate Limiting
# is on the free tier; bucket is generous enough to never bother a human
# (humans mint maybe 1 room per talk) but caps script-driven mint loops.
# Period must be 10 or 60.
[[unsafe.bindings]]
name = "MINT_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }
